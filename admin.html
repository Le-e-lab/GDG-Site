<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard | GDSC Africa University</title>
    
    <!-- PWA Manifest & Icons -->
    <link rel="icon" type="image/jpeg" href="gdg-logo.jpg" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#4285F4" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Quill.js CSS for Rich Text Editor -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script>
      // Prevent FOUC (Flash of Unstyled Content)
      // Default to light mode unless explicitly set to dark
      if (localStorage.theme === 'dark') {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }

      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              "google-blue": "#4285F4",
              "google-red": "#EA4335",
              "google-yellow": "#FBBC05",
              "google-green": "#34A853",
            },
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              display: ["Space Grotesk", "sans-serif"],
            },
          },
        },
      };
    </script>
  </head>
  <body
    class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white font-sans antialiased h-screen flex overflow-hidden"
  >
    <!-- Login Modal (Shown if not authenticated) -->
    <div
      id="login-modal"
      class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm z-50 flex items-center justify-center"
    >
      <div class="bg-white dark:bg-gray-800 rounded-2xl p-8 max-w-sm w-full mx-4 shadow-xl">
        <div class="flex justify-center mb-6">
          <span class="font-display font-bold text-2xl text-google-blue"
            >Admin Login</span
          >
        </div>
        <form id="login-form" class="space-y-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1"
              >Email</label
            >
            <input
              type="email"
              id="login-email"
              required
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-google-blue outline-none transition-all"
            />
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1"
              >Password</label
            >
            <input
              type="password"
              id="login-password"
              required
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-google-blue outline-none transition-all"
            />
          </div>
          <div
            id="login-error"
            class="text-red-500 text-sm hidden font-medium"
          ></div>
          <button
            type="submit"
            class="w-full bg-google-blue text-white font-bold py-3 rounded-lg hover:bg-google-blue/90 transition-colors"
          >
            Sign In
          </button>
        </form>
      </div>
    </div>

    <aside
      class="w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-800 flex-col hidden sm:flex h-full"
    >
      <div class="p-6 border-b border-gray-200 dark:border-gray-800 flex items-center gap-3">
        <a href="index.html" class="hover:opacity-80 transition-opacity">
          <img src="gdg-logo.jpg" alt="GDG Logo" class="w-8 h-8 object-contain rounded-full dark:bg-white dark:rounded-md dark:p-0.5">
        </a>
        <span class="font-display font-bold text-xl text-gray-900 dark:text-white"
          >GDSC Admin</span
        >
      </div>
      <nav
        class="flex-1 p-4 flex flex-col gap-2 overflow-y-auto"
        id="admin-tabs"
      >
        <button
          data-tab="blog"
          class="tab-btn w-full text-left px-4 py-3 rounded-lg font-semibold text-google-blue bg-blue-50 transition-all flex items-center gap-3"
        >
          <svg class="w-5 h-5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
          Blog Posts
        </button>
        <button
          data-tab="projects"
          class="tab-btn w-full text-left px-4 py-3 rounded-lg font-semibold text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:bg-gray-800/50 transition-all flex items-center gap-3"
        >
          <svg class="w-5 h-5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/></svg>
          Projects
        </button>
        <button
          data-tab="team"
          class="tab-btn w-full text-left px-4 py-3 rounded-lg font-semibold text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:bg-gray-800/50 transition-all flex items-center gap-3"
        >
          <svg class="w-5 h-5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
          Core Team
        </button>
        <button
          data-tab="events"
          class="tab-btn w-full text-left px-4 py-3 rounded-lg font-semibold text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:bg-gray-800/50 transition-all flex items-center gap-3"
        >
          <svg class="w-5 h-5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          Events
        </button>
        <button
          data-tab="testimonials"
          class="tab-btn w-full text-left px-4 py-3 rounded-lg font-semibold text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:bg-gray-800/50 transition-all flex items-center gap-3"
        >
          <svg class="w-5 h-5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
          Testimonials
        </button>
        <button
          data-tab="applications"
          class="tab-btn w-full text-left px-4 py-3 rounded-lg font-semibold text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:bg-gray-800/50 transition-all flex items-center gap-3"
        >
          <svg class="w-5 h-5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          Applications
        </button>
        <button
          data-tab="newsletter"
          class="tab-btn w-full text-left px-4 py-3 rounded-lg font-semibold text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:bg-gray-800/50 transition-all flex items-center gap-3"
        >
          <svg class="w-5 h-5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          Newsletter
        </button>
      </nav>
      
      <!-- User Profile & Logout -->
      <div class="p-4 border-t border-gray-200 dark:border-gray-800">
        <div class="flex items-center gap-3 mb-4 px-2">
          <div class="w-10 h-10 rounded-full bg-google-blue/10 flex items-center justify-center text-google-blue font-bold shadow-sm">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          </div>
          <div class="overflow-hidden">
            <p class="text-xs font-bold text-gray-900 dark:text-white truncate" id="admin-user-email">Admin</p>
            <p class="text-xs text-gray-500 dark:text-gray-400">Superuser</p>
          </div>
        </div>
        <div class="h-px bg-gray-200 dark:bg-gray-700 my-4"></div>
        <button id="theme-toggle" class="w-full flex items-center justify-center gap-2 py-2 text-sm font-semibold text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors mb-2 border border-transparent hover:border-gray-200 dark:border-gray-600 dark:hover:border-gray-600">
            <svg id="theme-toggle-light-icon" class="w-4 h-4 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            <svg id="theme-toggle-dark-icon" class="w-4 h-4 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            <span id="theme-text-light" class="hidden dark:block">Light Mode</span>
            <span id="theme-text-dark" class="block dark:hidden">Dark Mode</span>
        </button>
        <button
          id="logout-btn"
          class="w-full flex items-center justify-center gap-2 py-2 text-sm font-bold text-red-600 hover:bg-red-50 rounded-lg transition-colors border border-transparent hover:border-red-100"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          Sign Out
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full overflow-hidden">
      <!-- Mobile Header -->
      <header
        class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-800 px-4 py-3 flex justify-between items-center sm:hidden shadow-sm z-10 relative"
      >
        <div class="flex items-center gap-2">
          <a href="index.html" class="text-gray-500 dark:text-gray-400 hover:text-google-blue transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
          </a>
          <img src="gdg-logo.jpg" alt="GDG Logo" class="w-7 h-7 object-contain rounded-full dark:bg-white dark:rounded-md dark:p-0.5">
          <span class="font-display font-bold text-base text-gray-900 dark:text-white">Admin</span>
        </div>
        <select
          id="mobile-tab-select"
          class="bg-google-blue/10 text-google-blue border-0 rounded-full py-1.5 px-3 text-sm font-semibold focus:ring-2 focus:ring-google-blue outline-none appearance-none cursor-pointer"
        >
          <option value="blog">📝 Blog</option>
          <option value="projects">💻 Projects</option>
          <option value="team">👥 Team</option>
          <option value="events">📅 Events</option>
          <option value="testimonials">💬 Quotes</option>
          <option value="applications">📋 Applications</option>
          <option value="newsletter">📧 Newsletter</option>
        </select>
      </header>

      <div class="flex-1 p-4 sm:p-8 overflow-y-auto">
        <div class="max-w-5xl mx-auto">
          
          <!-- Dashboard Overview Stats (Dynamic) -->
          <div id="dashboard-stats" class="grid grid-cols-2 md:grid-cols-4 gap-3 sm:gap-4 mb-6 sm:mb-8">
            <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-800 p-4 rounded-xl shadow-sm">
              <p class="text-sm font-semibold text-gray-500 dark:text-gray-400 mb-1">Total Posts</p>
              <h3 class="font-display text-3xl font-bold text-google-blue" id="stat-blog">-</h3>
            </div>
            <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-800 p-4 rounded-xl shadow-sm">
              <p class="text-sm font-semibold text-gray-500 dark:text-gray-400 mb-1">Projects Built</p>
              <h3 class="font-display text-3xl font-bold text-google-green" id="stat-projects">-</h3>
            </div>
            <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-800 p-4 rounded-xl shadow-sm">
              <p class="text-sm font-semibold text-gray-500 dark:text-gray-400 mb-1">Core Team</p>
              <h3 class="font-display text-3xl font-bold text-google-yellow" id="stat-team">-</h3>
            </div>
            <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-800 p-4 rounded-xl shadow-sm">
              <p class="text-sm font-semibold text-gray-500 dark:text-gray-400 mb-1">Total Events</p>
              <h3 class="font-display text-3xl font-bold text-google-red" id="stat-events">-</h3>
            </div>
          </div>

          <div class="flex flex-col md:flex-row md:justify-between md:items-end gap-4 mb-6">
            <div>
              <h1
                id="page-title"
                class="font-display font-bold text-3xl text-gray-900 dark:text-white"
              >
                Manage Blog
              </h1>
              <p id="page-subtitle" class="text-gray-500 dark:text-gray-400 mt-1">
                Add or edit blog posts for the site.
              </p>
            </div>
            <div class="flex flex-col sm:flex-row sm:items-center gap-3 w-full sm:w-auto">
              <!-- Search Bar -->
              <div class="relative flex-1 md:w-64">
                <input type="text" id="table-search" placeholder="Search..." class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-google-blue focus:border-google-blue outline-none transition-all">
                <svg class="w-4 h-4 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
              </div>
              <button
                id="add-new-btn"
                class="bg-google-blue text-white px-5 py-2 rounded-lg font-bold text-sm hover:bg-blue-600 transition-colors shadow-sm flex items-center gap-2"
              >
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                Add New
              </button>
            </div>
          </div>

          <!-- Content Table/Grid Container -->
          <div
            id="content-container"
            class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-800 rounded-xl shadow-sm overflow-hidden"
          >
            <!-- Dynamic content injected here -->
            <div class="p-8 text-center text-gray-500 dark:text-gray-400">Loading...</div>
          </div>
        </div>
      </div>
    </main>

    <!-- Generic Modal for Add/Edit -->
    <div
      id="edit-modal"
      class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity"
    >
      <div
        class="bg-white rounded-2xl p-8 max-w-2xl w-full mx-4 shadow-xl max-h-[90vh] overflow-y-auto scale-95 transition-transform duration-200"
        id="edit-modal-content"
      >
        <div class="flex justify-between items-center mb-6">
          <h2
            id="modal-title"
            class="font-display font-bold text-2xl text-gray-900 dark:text-white"
          >
            Add Item
          </h2>
          <button
            id="close-modal-btn"
            class="text-gray-400 hover:text-gray-600 dark:text-gray-300"
          >
            <svg
              class="w-6 h-6"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              ></path>
            </svg>
          </button>
        </div>

        <form id="edit-form" class="space-y-4">
          <!-- Dynamic form fields injected here -->
          <div id="form-fields"></div>

          <div
            class="pt-4 border-t border-gray-200 dark:border-gray-800 flex justify-end gap-3 mt-6"
          >
            <button
              type="button"
              id="cancel-modal-btn"
              class="px-5 py-2 rounded-lg font-semibold text-gray-600 dark:text-gray-300 hover:bg-gray-100 transition-colors"
            >
              Cancel
            </button>
            <button
              type="submit"
              id="save-modal-btn"
              class="bg-google-blue text-white px-5 py-2 rounded-lg font-bold hover:bg-blue-600 transition-colors"
            >
              Save Changes
            </button>
          </div>
        </form>
      </div>
    </div>

    <script type="module" src="admin.js"></script>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3"></div>

    <!-- Custom Confirm Dialog -->
    <div id="confirm-modal" class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm z-[60] flex items-center justify-center hidden opacity-0 transition-opacity">
      <div id="confirm-modal-content" class="bg-white rounded-2xl p-6 max-w-sm w-full mx-4 shadow-xl scale-95 transition-transform duration-200">
        <div class="w-12 h-12 rounded-full bg-red-100 flex items-center justify-center mb-4 mx-auto">
          <svg class="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
          </svg>
        </div>
        <h3 class="font-display text-xl font-bold text-gray-900 dark:text-white mb-2 text-center">Confirm Deletion</h3>
        <p class="text-gray-500 dark:text-gray-400 text-sm text-center mb-6">Are you sure you want to delete this item? This action cannot be undone.</p>
        <div class="flex gap-3">
          <button id="confirm-cancel-btn" class="flex-1 px-4 py-2 rounded-lg font-semibold text-gray-700 bg-gray-100 hover:bg-gray-200 transition-colors">Cancel</button>
          <button id="confirm-delete-btn" class="flex-1 px-4 py-2 rounded-lg font-bold text-white bg-red-600 hover:bg-red-700 transition-colors shadow-sm">Delete</button>
        </div>
      </div>
    </div>
    
    <!-- Quill.js Library -->
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <!-- PWA Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js');
        });
      }
    </script>

    <!-- Theme Toggle Script -->
    <script>
      const themeToggleBtn = document.getElementById('theme-toggle');
      const toggleTheme = () => {
        if (document.documentElement.classList.contains('dark')) {
          document.documentElement.classList.remove('dark');
          localStorage.theme = 'light';
        } else {
          document.documentElement.classList.add('dark');
          localStorage.theme = 'dark';
        }
      };
      if (themeToggleBtn) themeToggleBtn.addEventListener('click', toggleTheme);
    </script>
  </body>
</html>
