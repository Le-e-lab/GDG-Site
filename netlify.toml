[build]
  publish = "."
  command = "echo 'Static HTML site, no build command needed'"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/_api/*"
  [headers.values]
    Cache-Control = "no-cache"

[[plugins]]
  package = "@netlify/plugin-sitemap"
