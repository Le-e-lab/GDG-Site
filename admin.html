<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard | GDSC Africa University</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "google-blue": "#4285F4",
              "google-red": "#EA4335",
              "google-yellow": "#FBBC05",
              "google-green": "#34A853",
            },
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              display: ["Space Grotesk", "sans-serif"],
            },
          },
        },
      };
    </script>
  </head>
  <body
    class="bg-gray-50 text-gray-900 font-sans antialiased h-screen flex overflow-hidden"
  >
    <!-- Login Modal (Shown if not authenticated) -->
    <div
      id="login-modal"
      class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm z-50 flex items-center justify-center"
    >
      <div class="bg-white rounded-2xl p-8 max-w-sm w-full mx-4 shadow-xl">
        <div class="flex justify-center mb-6">
          <span class="font-display font-bold text-2xl text-google-blue"
            >Admin Login</span
          >
        </div>
        <form id="login-form" class="space-y-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1"
              >Email</label
            >
            <input
              type="email"
              id="login-email"
              required
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-google-blue outline-none transition-all"
            />
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1"
              >Password</label
            >
            <input
              type="password"
              id="login-password"
              required
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-google-blue outline-none transition-all"
            />
          </div>
          <div
            id="login-error"
            class="text-red-500 text-sm hidden font-medium"
          ></div>
          <button
            type="submit"
            class="w-full bg-google-blue text-white font-bold py-3 rounded-lg hover:bg-google-blue/90 transition-colors"
          >
            Sign In
          </button>
        </form>
      </div>
    </div>

    <!-- Sidebar -->
    <aside
      class="w-64 bg-white border-r border-gray-200 flex flex-col hidden sm:flex h-full"
    >
      <div class="p-6 border-b border-gray-200">
        <span class="font-display font-bold text-xl text-gray-900"
          >GDSC Admin</span
        >
      </div>
      <nav
        class="flex-1 p-4 flex flex-col gap-2 overflow-y-auto"
        id="admin-tabs"
      >
        <button
          data-tab="blog"
          class="tab-btn w-full text-left px-4 py-2 rounded-lg font-semibold text-google-blue bg-blue-50 transition-colors"
        >
          Blog Posts
        </button>
        <button
          data-tab="projects"
          class="tab-btn w-full text-left px-4 py-2 rounded-lg font-semibold text-gray-600 hover:bg-gray-50 transition-colors"
        >
          Projects
        </button>
        <button
          data-tab="team"
          class="tab-btn w-full text-left px-4 py-2 rounded-lg font-semibold text-gray-600 hover:bg-gray-50 transition-colors"
        >
          Core Team
        </button>
        <button
          data-tab="events"
          class="tab-btn w-full text-left px-4 py-2 rounded-lg font-semibold text-gray-600 hover:bg-gray-50 transition-colors"
        >
          Events
        </button>
        <button
          data-tab="testimonials"
          class="tab-btn w-full text-left px-4 py-2 rounded-lg font-semibold text-gray-600 hover:bg-gray-50 transition-colors"
        >
          Testimonials
        </button>
        <button
          data-tab="applications"
          class="tab-btn w-full text-left px-4 py-2 rounded-lg font-semibold text-gray-600 hover:bg-gray-50 transition-colors"
        >
          Applications
        </button>
      </nav>
      <div class="p-4 border-t border-gray-200">
        <button
          id="logout-btn"
          class="w-full py-2 text-sm font-bold text-red-600 hover:bg-red-50 rounded-lg transition-colors"
        >
          Sign Out
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full overflow-hidden">
      <header
        class="bg-white border-b border-gray-200 px-8 py-4 flex justify-between items-center sm:hidden"
      >
        <span class="font-display font-bold text-xl text-gray-900"
          >GDSC Admin</span
        >
        <select
          id="mobile-tab-select"
          class="border border-gray-300 rounded-md py-1 px-2 text-sm"
        >
          <option value="blog">Blog Posts</option>
          <option value="projects">Projects</option>
          <option value="team">Core Team</option>
          <option value="events">Events</option>
          <option value="testimonials">Testimonials</option>
          <option value="applications">Applications</option>
        </select>
      </header>

      <div class="flex-1 p-8 overflow-y-auto">
        <div class="max-w-4xl mx-auto">
          <div class="flex justify-between items-end mb-8">
            <div>
              <h1
                id="page-title"
                class="font-display font-bold text-3xl text-gray-900"
              >
                Manage Blog
              </h1>
              <p id="page-subtitle" class="text-gray-500 mt-1">
                Add or edit blog posts for the site.
              </p>
            </div>
            <button
              id="add-new-btn"
              class="bg-google-blue text-white px-5 py-2 rounded-lg font-bold hover:bg-blue-600 transition-colors hidden shadow-sm"
            >
              + Add New
            </button>
          </div>

          <!-- Content Table/Grid Container -->
          <div
            id="content-container"
            class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden"
          >
            <!-- Dynamic content injected here -->
            <div class="p-8 text-center text-gray-500">Loading...</div>
          </div>
        </div>
      </div>
    </main>

    <!-- Generic Modal for Add/Edit -->
    <div
      id="edit-modal"
      class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity"
    >
      <div
        class="bg-white rounded-2xl p-8 max-w-2xl w-full mx-4 shadow-xl max-h-[90vh] overflow-y-auto scale-95 transition-transform duration-200"
        id="edit-modal-content"
      >
        <div class="flex justify-between items-center mb-6">
          <h2
            id="modal-title"
            class="font-display font-bold text-2xl text-gray-900"
          >
            Add Item
          </h2>
          <button
            id="close-modal-btn"
            class="text-gray-400 hover:text-gray-600"
          >
            <svg
              class="w-6 h-6"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              ></path>
            </svg>
          </button>
        </div>

        <form id="edit-form" class="space-y-4">
          <!-- Dynamic form fields injected here -->
          <div id="form-fields"></div>

          <div
            class="pt-4 border-t border-gray-200 flex justify-end gap-3 mt-6"
          >
            <button
              type="button"
              id="cancel-modal-btn"
              class="px-5 py-2 rounded-lg font-semibold text-gray-600 hover:bg-gray-100 transition-colors"
            >
              Cancel
            </button>
            <button
              type="submit"
              id="save-modal-btn"
              class="bg-google-blue text-white px-5 py-2 rounded-lg font-bold hover:bg-blue-600 transition-colors"
            >
              Save Changes
            </button>
          </div>
        </form>
      </div>
    </div>

    <script type="module" src="admin.js"></script>
  </body>
</html>
